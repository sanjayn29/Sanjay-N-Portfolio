<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="/LoGo-blue.webp" />

  <!-- Google Fonts — preconnect first so DNS resolves in parallel, then load non-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
  </noscript>

  <title>Sanjay N | Freelancer</title>
  <meta
    name="description"
    content="Sanjay N — Full Stack Developer, AI Engineer & Freelancer. Explore my projects, skills, achievements, and professional journey."
  />
  <link rel="canonical" href="https://sanjayn.me/" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:title" content="Sanjay N | Full Stack Developer, AI Engineer & Freelancer" />
  <meta property="og:description" content="Personal portfolio of Sanjay N — projects, skills, achievements, and social profiles." />
  <meta property="og:type" content="profile" />
  <meta property="og:url" content="https://sanjayn.me/" />
  <meta property="og:image" content="https://sanjayn.me/preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sanjay N | Full Stack Developer, AI Engineer & Freelancer" />
  <meta name="twitter:description" content="Portfolio of Sanjay N — Full Stack Developer, AI Engineer & Freelancer." />
  <meta name="twitter:image" content="https://sanjayn.me/preview.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
